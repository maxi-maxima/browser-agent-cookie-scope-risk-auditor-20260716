name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.0
      - uses: actions/setup-python@v6.0.0
        with:
          python-version: "3.11"
      - run: python -m unittest discover -s tests -v
      - run: python -m py_compile browser_agent_cookie_scope_risk_auditor_20260716/__main__.py tests/test_cookie.py
      - run: python -m browser_agent_cookie_scope_risk_auditor_20260716 examples/cookies.json --allow-domain example.com
